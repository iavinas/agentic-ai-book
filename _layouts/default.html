<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>

  <!-- Rouge (Jekyll/Kramdown) token colors — without this, web builds render code as plain text -->
  <link rel="stylesheet" href="{{ '/assets/css/rouge-syntax.css' | relative_url }}">

  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof renderMathInElement === 'undefined') return;
      renderMathInElement(document.body, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
          // Kramdown + math_engine: mathjax emits these; keep so old builds / mixed sources still render
          { left: '\\[', right: '\\]', display: true },
          { left: '\\(', right: '\\)', display: false }
        ],
        ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code', 'tt'],
        strict: false
      });
    });
  </script>

  <!-- Mermaid: Jekyll+Rouge outputs fenced ```mermaid as highlighter-rouge > pre > code, not div.mermaid -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    function injectMermaidFromCodeBlocks() {
      const seen = new Set();
      document.querySelectorAll(
        'div[class*="language-mermaid"] pre code, pre code.language-mermaid'
      ).forEach((code) => {
        const pre = code.closest('pre');
        if (!pre || seen.has(pre)) return;
        seen.add(pre);
        const outer = pre.closest('.highlighter-rouge') || pre.closest('div[class*="language-mermaid"]');
        const mountPoint = outer || pre;
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent;
        mountPoint.replaceWith(div);
      });
    }

    async function bootMermaid() {
      await new Promise((resolve) => {
        if (document.readyState === 'loading')
          document.addEventListener('DOMContentLoaded', resolve, { once: true });
        else resolve();
      });
      injectMermaidFromCodeBlocks();
      try {
        await mermaid.run();
      } finally {
        window.dispatchEvent(new CustomEvent('book:content-ready', { bubbles: false }));
      }
    }
    bootMermaid();
  </script>

  <style>
    :root {
      --bg: #FAFAF9;
      --surface: #FFFFFF;
      --border: #E5E3DC;
      --text-1: #1A1A18;
      --text-2: #5C5B56;
      --text-3: #9C9A94;
      --purple: #534AB7;
      --purple-light: #EEEDFE;
      --teal: #0F6E56;
      --teal-light: #E1F5EE;
      --coral: #993C1D;
      --coral-light: #FAECE7;
      --amber: #854F0B;
      --amber-light: #FAEEDA;
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --font-body: 'Georgia', 'Times New Roman', serif;
      --font-ui: system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --content-width: 780px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.75;
    }

    /* Layout */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      font-family: var(--font-ui);
      font-size: 14px;
    }
    .site-header a {
      color: var(--text-2);
      text-decoration: none;
    }
    .site-header a:hover { color: var(--purple); }
    .site-title { font-weight: 600; color: var(--text-1); }

    .page-content {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    /* Typography */
    h1 {
      font-family: var(--font-ui);
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border);
    }
    h2 {
      font-family: var(--font-ui);
      font-size: 1.55rem;
      font-weight: 600;
      margin-top: 3rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    h3 {
      font-family: var(--font-ui);
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.6rem;
    }
    h4 {
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-2);
      margin-top: 1.4rem;
      margin-bottom: 0.4rem;
    }

    p { margin-bottom: 1.4rem; }
    strong { font-weight: 700; }
    em { font-style: italic; }
    a { color: var(--purple); text-decoration: underline; text-decoration-color: rgba(83,74,183,0.3); }
    a:hover { color: var(--text-1); }

    /* Lead paragraph */
    blockquote > p:first-child {
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--text-2);
      max-width: 660px;
    }

    /* Code */
    pre {
      margin: 1.5rem 0;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 1rem 1.2rem;
    }
    code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg);
      padding: 0.15rem 0.35rem;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    pre code {
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.6;
      background: none;
      padding: 0;
      border: none;
      border-radius: 0;
      color: var(--text-1); /* fenced-block tokens colored via rouge-syntax.css */
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.8rem 0;
      font-family: var(--font-ui);
      font-size: 14px;
    }
    th {
      background: #F1EFE8;
      color: var(--text-1);
      font-weight: 600;
      text-align: left;
      padding: 0.6rem 0.9rem;
      border-bottom: 2px solid var(--border);
    }
    td {
      padding: 0.55rem 0.9rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-2);
    }
    tr:last-child td { border-bottom: none; }

    /* Lists */
    ul, ol { padding-left: 1.5rem; margin-bottom: 1.4rem; }
    li { margin-bottom: 0.3rem; line-height: 1.65; }

    /* Blockquotes / Callouts */
    blockquote {
      margin: 2rem 0;
      padding: 1.1rem 1.4rem;
      border-radius: 8px;
      border-left: 4px solid var(--purple);
      background: var(--purple-light);
    }
    blockquote p:last-child { margin-bottom: 0; }

    /* Mermaid diagrams */
    .mermaid {
      margin: 2rem 0;
      text-align: center;
    }

    /* ASCII art blocks */
    pre:has(code.language-text), pre:has(code.language-ascii) {
      background: var(--surface);
      color: var(--text-1);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
    }

    /* Footer nav */
    .chapter-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 2px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-family: var(--font-ui);
      font-size: 14px;
    }
    .chapter-footer a {
      color: var(--text-2);
      text-decoration: none;
    }
    .chapter-footer a:hover { color: var(--purple); }

    /* Responsive */
    @media (max-width: 640px) {
      .page-content { padding: 1.5rem 1rem 4rem; }
      h1 { font-size: 1.8rem; }
      h2 { font-size: 1.3rem; }
    }

    /* Reader highlights (web-highlighter) */
    .reader-highlight-wrap {
      padding: 0 0.04em;
      border-radius: 3px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      background: rgba(250, 238, 218, 0.85);
      border-bottom: 2px solid rgba(133, 79, 11, 0.25);
    }
    /* Reader highlights: tiny FAB + optional popover */
    #reader-highlight-ui {
      position: fixed;
      right: max(8px, env(safe-area-inset-right, 0px));
      bottom: max(8px, env(safe-area-inset-bottom, 0px));
      z-index: 50;
      font-family: var(--font-ui);
    }
    .reader-highlight-fab {
      width: 34px;
      height: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--amber);
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(26, 26, 24, 0.08);
    }
    .reader-highlight-fab:hover {
      border-color: rgba(83, 74, 183, 0.35);
      color: var(--purple);
    }
    .reader-highlight-fab:focus-visible {
      outline: 2px solid var(--purple);
      outline-offset: 2px;
    }
    .reader-highlight-popover {
      position: absolute;
      right: 0;
      bottom: calc(100% + 8px);
      width: max-content;
      max-width: min(220px, calc(100vw - 28px));
      padding: 6px 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 28px rgba(26, 26, 24, 0.12);
    }
    .reader-highlight-popover[hidden] {
      display: none !important;
    }
    .reader-highlight-clear-btn {
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      width: 100%;
      padding: 6px 8px;
      border-radius: 7px;
      border: 1px solid rgba(133, 79, 11, 0.25);
      background: var(--amber-light);
      color: var(--text-1);
      cursor: pointer;
    }
    .reader-highlight-clear-btn:hover {
      filter: brightness(0.98);
    }
    .reader-highlight-clear-btn:focus-visible {
      outline: 2px solid var(--purple);
      outline-offset: 1px;
    }
    .reader-highlight-micro {
      margin: 5px 0 0;
      font-size: 10px;
      line-height: 1.35;
      color: var(--text-3);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="{{ '/' | relative_url }}" class="site-title">Agentic AI</a>
    <span style="color: var(--text-3); margin-left: 1rem;">Building, Training, and Deploying Autonomous Systems</span>
  </header>

  <main class="page-content">
    {{ content }}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/web-highlighter@0.7.4/dist/web-highlighter.min.js" defer crossorigin></script>
  <script src="{{ '/assets/js/reader-highlights-store.js' | relative_url }}" defer></script>

</body>
</html>
